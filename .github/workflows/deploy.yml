name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-cache: "npm"
          node-version: 20

      - name: Install Dependencies
        run: npm ci || npm install

      - name: Clean Previous Builds
        run: npm run clean || true

      - name: Build Application
        run: npm run build

      - name: Setup GitHub Pages Configuration
        uses: actions/configure-pages@v4

      - name: Prepare Artifact
        run: |
          mkdir -p public-deploy
          if [ -d "dist" ]; then
            echo "Deploying Vite build ('dist')."
            cp -r dist/* public-deploy/
          elif [ -d "out" ]; then
            echo "Deploying Next.js export ('out')."
            cp -r out/* public-deploy/
          elif [ -d "build" ]; then
            echo "Deploying React build ('build')."
            cp -r build/* public-deploy/
          else
            echo "No standard build directory found!"
            exit 1
          fi

      - name: Upload Build Artifacts
        uses: actions/upload-pages-artifact@v3
        with:
          path: public-deploy

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
